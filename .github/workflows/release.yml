name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate release tag
        run: |
          if ! [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '${GITHUB_REF_NAME}' does not match v<major>.<minor>.<patch>."
            exit 1
          fi

      - name: Compute release metadata
        id: meta
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          tarball_url="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${tag}.tar.gz"

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tarball_url=${tarball_url}" >> "${GITHUB_OUTPUT}"

      - name: Compute source tarball checksum
        id: checksum
        run: |
          curl -fL -o /tmp/catmd.tar.gz "${{ steps.meta.outputs.tarball_url }}"
          sha="$(sha256sum /tmp/catmd.tar.gz | awk '{print $1}')"
          echo "sha256=${sha}" >> "${GITHUB_OUTPUT}"

      - name: Ensure tap token exists
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "Missing secret: HOMEBREW_TAP_TOKEN"
            exit 1
          fi

      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: schneidermayer/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update tap formula
        working-directory: homebrew-tap
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          SHA256: ${{ steps.checksum.outputs.sha256 }}
        run: |
          mkdir -p Formula
          cat > Formula/catmd.rb <<FORMULA
          class Catmd < Formula
            desc "Cat-like CLI that renders Markdown with ANSI styling"
            homepage "https://github.com/schneidermayer/catmd"
            url "https://github.com/schneidermayer/catmd/archive/refs/tags/${TAG}.tar.gz"
            sha256 "${SHA256}"
            license "MIT"

            depends_on "rust" => :build

            def install
              system "cargo", "install", *std_cargo_args(path: ".")
            end

            test do
              assert_match "catmd", shell_output("#{bin}/catmd --help")
            end
          end
          FORMULA

      - name: Commit and push formula update
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Formula/catmd.rb
          if git diff --cached --quiet; then
            echo "No formula changes to commit."
            exit 0
          fi

          git commit -m "catmd ${{ steps.meta.outputs.tag }}"
          git push origin HEAD:main

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          body: |
            `catmd ${{ steps.meta.outputs.version }}` is now available.

            Install with Homebrew:

            ```bash
            brew tap schneidermayer/tap
            brew install schneidermayer/tap/catmd
            ```
